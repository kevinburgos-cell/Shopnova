name: ShopNova CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-analyze:
    name: Tests + SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm install

      - name: Ejecutar tests con cobertura
        working-directory: backend
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary
        env:
          NODE_ENV: test

      - name: Verificar cobertura mínima 60%
        working-directory: backend
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Cobertura de líneas: $COVERAGE%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "ERROR: Cobertura $COVERAGE% es menor al 60% requerido"
            exit 1
          fi
          echo "Cobertura OK: $COVERAGE%"

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  build-check:
    name: Verificar build
    runs-on: ubuntu-latest
    needs: test-and-analyze

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias backend
        working-directory: backend
        run: npm install --production

      - name: Verificar que la app inicia
        working-directory: backend
        run: |
          timeout 10 node src/app.js &
          sleep 3
          curl -f http://localhost:3001/api/health || exit 1
          echo "App arranca correctamente"
        continue-on-error: false
