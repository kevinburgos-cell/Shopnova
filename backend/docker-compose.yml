version: '3.8'

services:
  shopnova-blue:
    image: ${DOCKER_IMAGE:-shopnova-backend}:${IMAGE_TAG:-latest}
    container_name: shopnova-blue
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - APP_VERSION=${IMAGE_TAG:-latest}
      - SLOT=blue
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  shopnova-green:
    image: ${DOCKER_IMAGE:-shopnova-backend}:${IMAGE_TAG:-latest}
    container_name: shopnova-green
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - APP_VERSION=${IMAGE_TAG:-latest}
      - SLOT=green
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
